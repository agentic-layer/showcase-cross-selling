# Presidio PII detection service.
# Uses a combined image that includes both analyzer and anonymizer with German language support.
#
# Routes:
#   POST presidio:80/analyze
#   POST presidio:80/anonymize
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: presidio
  namespace: ai-gateway
  labels:
    app: presidio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: presidio
  template:
    metadata:
      labels:
        app: presidio
    spec:
      containers:
        - name: presidio
          image: ghcr.io/agentic-layer/presidio:0.3.0
          ports:
            - containerPort: 8000
          env:
            - name: OTEL_SERVICE_NAME
              value: presidio
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://lgtm.monitoring.svc.cluster.local:4317"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc/protobuf"
            - name: LOG_LEVEL
              value: "DEBUG"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: presidio
  namespace: ai-gateway
spec:
  selector:
    app: presidio
  ports:
    - port: 80
      targetPort: 8000
