apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: ToolServer
metadata:
  name: insurance-products
spec:
  protocol: mcp
  transportType: http
  image: insurance_products:latest
  port: 8000
  replicas: 1
  env:
    - name: OTEL_SERVICE_NAME
      value: insurance-products-mcp
  envFrom:
    - configMapRef:
        name: otel-tempo-config
        optional: true