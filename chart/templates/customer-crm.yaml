apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: ToolServer
metadata:
  name: customer-crm
  namespace: {{ .Values.namespace.name }}
  labels:
    {{ include "showcase-cross-selling.labels" . | nindent 4 }}
spec:
  protocol: mcp
  transportType: http
  image: {{ .Values.images.toolServers.customerCrm.repository }}:{{ .Values.images.toolServers.customerCrm.tag }}
  args:
    - "customer_crm.py"
  port: 8000
  replicas: 1
  env:
    - name: OTEL_SERVICE_NAME
      value: customer-crm
    - name: LOGLEVEL
      value: {{ .Values.toolServers.logLevel | quote }}
  envFrom:
    - configMapRef:
        name: {{ .Values.externalDependencies.otelConfig.name }}
        optional: true
