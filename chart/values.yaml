# Namespace configuration
namespace:
  # Whether to create the namespace
  create: true
  # Name of the namespace
  name: showcase-cross-selling

# Image configurations
images:
  toolServers:
    customerCrm:
      repository: ghcr.io/agentic-layer/showcase-cross-selling-mcp-servers
      tag: latest
    insuranceProducts:
      repository: ghcr.io/agentic-layer/showcase-cross-selling-mcp-servers
      tag: latest
  frontend:
    repository: ghcr.io/agentic-layer/showcase-cross-selling-frontend
    tag: latest

# Image configurations
toolServers:
  # Log level for tool servers
  logLevel: "DEBUG"

# Agent common configuration
agents:
  # Log level for agents
  logLevel: "DEBUG"
  # Optional AI Gateway reference for all agents
  # aiGatewayRef:
  #   name: ai-gateway
  #   namespace: ai-gateway

# Tool Gateway reference used by ToolRoute resources to expose tool servers.
# Leave ref empty to let the tool-gateway operator resolve the default ToolGateway
# (a ToolGateway in the well-known "tool-gateway" namespace).
# Override to pin to a specific ToolGateway, e.g.:
#   ref:
#     name: tool-gateway
#     namespace: tool-gateway
toolGateway:
  ref: {}

# Frontend configuration
frontend:
  # Backend URL for the frontend to proxy agent requests
  backendUrl: "http://agent-gateway.agent-gateway"

# Testbench configuration
testbench:
  # Whether to install testbench evaluations and experiments
  enabled: true
  # Optional cron schedule for experiments (e.g., "0 * * * *")
  # schedule:

# Extra environment variables applied to all agents and tool servers
# Example:
#  - name: OTEL_EXPORTER_OTLP_PROTOCOL
#    value: "http/protobuf"
#  - name: OTEL_EXPORTER_OTLP_ENDPOINT
#    value: "http://lgtm.monitoring.svc.cluster.local:4318"
extraEnv: []
