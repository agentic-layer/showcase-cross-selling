name: Check

on:
  push:
    branches:
      - main
      - 'renovate/**'
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: 'actions/checkout@v6'

      - name: Install uv
        uses: 'astral-sh/setup-uv@v8.1.0'
        with:
          version: "0.11.8"
          enable-cache: true

      - name: Install Dependencies
        run: uv sync --directory mcp-servers

      - name: Run checks
        run: uv run --directory mcp-servers poe check

  check-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: 'actions/checkout@v6'

      - name: Setup Node.js
        uses: 'actions/setup-node@v6'
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Test
        run: npm run test
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: 'actions/checkout@v6'

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: 'v3.14.0'

      - name: Lint Helm Chart
        run: helm lint chart/
