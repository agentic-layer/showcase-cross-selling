apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: ToolServer
metadata:
  name: insurance-products
  namespace: {{ .Values.namespace.name }}
  labels:
    {{ include "showcase-cross-selling.labels" . | nindent 4 }}
spec:
  protocol: mcp
  transportType: http
  image: {{ .Values.images.toolServers.insuranceProducts.repository }}:{{ .Values.images.toolServers.insuranceProducts.tag }}
  port: 8000
  replicas: 1
  args:
    - "insurance_products.py"
  env:
    - name: OTEL_SERVICE_NAME
      value: insurance-products
    - name: LOGLEVEL
      value: {{ .Values.toolServers.logLevel | quote }}
  {{- with .Values.extraEnv }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
